<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>工程逆算スケジューラ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <style>
    :root { --print-cell-width: 36px; --print-cell-height: 28px; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f3f6fc; color: #0f172a; }
    .container { max-width: 1280px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    h1 { margin: 4px 0; font-size: 1.35rem; }
    h2 { margin: 4px 0 10px; font-size: 1.05rem; }
    .lead { margin: 0 0 12px; color: #334155; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    label { display: block; margin-bottom: 4px; font-size: .9rem; font-weight: 600; }
    input, textarea, button, select {
      width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 10px; font-size: 14px;
    }
    textarea { min-height: 72px; resize: vertical; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #dbe2ef; padding: 6px; font-size: .88rem; }
    th { background: #eff6ff; }
    .matrix { table-layout: fixed; width: max-content; }
    .matrix th, .matrix td { min-width: 40px; text-align: center; padding: 4px; }
    .left-col { min-width: 160px; text-align: left !important; }
    .due-col { min-width: 110px; background: #fef9c3; }
    .primary { background: #2563eb; color: #fff; border-color: #1d4ed8; cursor: pointer; }
    .secondary { background: #e2e8f0; cursor: pointer; }
    .danger { background: #fee2e2; cursor: pointer; }
    .row { display: flex; gap: 8px; align-items: end; }
    .row > * { flex: 1; }
    .inline { display: flex; gap: 6px; align-items: center; }
    .inline input { width: auto; }
    .status { margin-top: 8px; min-height: 1.2em; font-weight: 600; color: #0f766e; }
    .scroll { overflow-x: auto; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip { padding: 3px 8px; border-radius: 999px; font-size: .78rem; border: 1px solid #cbd5e1; }
    .color-cell { display: flex; align-items: center; gap: 6px; }
    .color-preview { width: 18px; height: 18px; border-radius: 999px; border: 1px solid #94a3b8; flex: 0 0 18px; }
    .step-color { min-width: 52px; padding: 2px; height: 34px; }
    .reorder-col { width: 90px; }
    .reorder-group { display: flex; gap: 4px; justify-content: center; }
    .reorder-group button { width: auto; padding: 4px 6px; font-size: 12px; }
    .matrix-stack { display: flex; flex-direction: column; gap: 10px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.45); display: none; align-items: center; justify-content: center; z-index: 30; }
    .modal-backdrop.open { display: flex; }
    .modal-card { width: min(560px, calc(100vw - 24px)); background: #fff; border-radius: 12px; padding: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.2); }
    .modal-title { margin: 0 0 8px; font-size: 1rem; }
    .modal-actions { display: flex; gap: 8px; margin-top: 8px; }

    @page { size: A4 landscape; margin: 10mm; }
    @media print {
      body { background: #fff; }
      h1, .lead, .card:not(.print-target) { display: none !important; }
      .container { max-width: none; padding: 0; }
      .print-target { display: block !important; margin: 0; padding: 0; box-shadow: none; border-radius: 0; }
      #result { overflow: visible; }
      .matrix { width: auto; }
      .matrix th, .matrix td { width: var(--print-cell-width); min-width: var(--print-cell-width); height: var(--print-cell-height); padding: 2px; font-size: 10px; }
      .matrix td { line-height: 1.2; vertical-align: middle; overflow: hidden; }
      .matrix td, .matrix th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      html[data-print-color='mono'] .matrix td { background: #fff !important; color: #111 !important; }
      .left-col { min-width: 34mm; }
      .due-col { min-width: 24mm; }
    }

    @media (max-width: 768px) {
      .container { padding: 10px; }
      .card { padding: 10px; border-radius: 10px; }
      h1 { font-size: 1.15rem; }
      h2 { font-size: 1rem; }
      .lead { font-size: .88rem; }
      .row { flex-direction: column; align-items: stretch; }
      .row > * { width: 100%; }
      .grid { grid-template-columns: 1fr; }
      .inline { font-size: .9rem; }
      input, textarea, button, select { font-size: 16px; }
      .scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      #stepsTable, #ordersTable { min-width: 640px; }
      .matrix th, .matrix td { min-width: 52px; font-size: .78rem; padding: 4px 3px; }
      .left-col { min-width: 120px; }
      .due-col { min-width: 92px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>工程逆算スケジューラ</h1>
  <p class="lead">複数注文をまとめて表示。納期と作業手順（色付き）を登録し、日付スケールで残作業を見える化します。</p>

  <section class="card">
    <h2>1) 日付スケール設定</h2>
    <div class="grid">
      <div>
        <label for="startDate">表示開始日</label>
        <input type="date" id="startDate">
      </div>
      <div>
        <label for="horizonDays">横に表示する営業日数</label>
        <input type="number" id="horizonDays" min="5" max="90" value="25">
      </div>
      <label class="inline"><input type="checkbox" id="skipWeekend" checked> 土日を除外</label>
    </div>
    <label for="holidayList">追加休日（改行区切り / 例: 2026-02-11）</label>
    <textarea id="holidayList"></textarea>
    <div class="row" style="margin-top:6px;">
      <div>
        <label for="holidayPicker">カレンダーから追加</label>
        <input type="date" id="holidayPicker">
      </div>
      <div><button id="addHoliday" class="secondary" type="button">追加</button></div>
    </div>
  </section>

  <section class="card">
    <h2>2) 作業手順登録（工程色つき）</h2>
    <div class="row">
      <div>
        <label for="patternName">パターン名</label>
        <input id="patternName" placeholder="標準">
      </div>
      <div><button id="savePattern" class="secondary">保存</button></div>
      <div>
        <label for="loadPattern">保存済み</label>
        <select id="loadPattern"></select>
      </div>
      <div><button id="deletePattern" class="danger">削除</button></div>
    </div>
    <div class="scroll"><table id="stepsTable" style="margin-top:10px;">
      <thead><tr><th style="width:55px;">順</th><th class="reorder-col">並替</th><th>工程名</th><th style="width:120px;">日数</th><th style="width:100px;">色</th><th style="width:80px;">削除</th></tr></thead>
      <tbody></tbody>
    </table></div>
    <div class="row" style="margin-top:8px;">
      <button id="addStep" class="secondary">工程追加</button>
      <button id="applySample" class="secondary">サンプル復元</button>
    </div>
    <div class="legend" id="legend"></div>
  </section>

  <section class="card">
    <h2>3) 注文登録（複数件）</h2>
    <div class="scroll"><table id="ordersTable">
      <thead><tr><th style="width:55px;">No</th><th class="reorder-col">並替</th><th>品名</th><th style="width:150px;">出荷日</th><th style="width:120px;">設定</th><th style="width:180px;">作業パターン</th><th style="width:80px;">削除</th></tr></thead>
      <tbody></tbody>
    </table></div>
    <div class="row" style="margin-top:8px;">
      <button id="addOrder" class="secondary">注文行追加</button>
      <button id="clearOrders" class="danger">注文をクリア</button>
    </div>
  </section>

  <section class="card">
    <div class="row">
      <button id="generate" class="primary">一覧を生成</button>
      <button id="importJson" class="secondary">JSON読込</button>
      <button id="exportJson" class="secondary">JSON保存</button>
      <input type="file" id="jsonFileInput" accept=".json,application/json" style="display:none;">
    </div>
    <div class="row" style="margin-top:8px;">
      <div>
        <label for="printCellWidth">印刷セル横幅（24〜72px）</label>
        <input type="range" id="printCellWidth" min="24" max="72" value="36">
      </div>
      <div>
        <label for="printCellHeight">印刷セル縦幅（20〜64px）</label>
        <input type="range" id="printCellHeight" min="20" max="64" value="28">
      </div>
      <div>
        <label for="printColorMode">印刷カラー</label>
        <select id="printColorMode">
          <option value="color" selected>カラー</option>
          <option value="mono">白黒</option>
        </select>
      </div>
      <div>
        <label for="printWrapDays">出力折返し</label>
        <select id="printWrapDays">
          <option value="none" selected>折返しなし</option>
          <option value="15">15日で2段</option>
        </select>
      </div>
      <button id="printPdf" class="secondary">印刷 / PDF出力</button>
    </div>
    <div class="status" id="status"></div>
  </section>

  <section class="card print-target">
    <h2>4) 出力（Excel風一覧）</h2>
    <div id="result" class="scroll">まだ生成していません。</div>
  </section>
</div>

<div id="scheduleModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card">
    <h3 class="modal-title">繰り返し設定</h3>
    <div class="grid">
      <div>
        <label for="scheduleMode">モード</label>
        <select id="scheduleMode">
          <option value="fixed">固定日（出荷日欄を使用）</option>
          <option value="recurring">繰り返し</option>
        </select>
      </div>
      <div id="recurringTypeWrap">
        <label for="recurringType">繰り返し種別</label>
        <select id="recurringType">
          <option value="weekly">毎週（曜日指定）</option>
          <option value="nth_weekday">第n週の曜日</option>
          <option value="monthly_day">毎月日付</option>
        </select>
      </div>
      <div id="weekdayWrap">
        <label for="recurringWeekday">曜日</label>
        <select id="recurringWeekday">
          <option value="1">月</option><option value="2">火</option><option value="3">水</option><option value="4">木</option><option value="5">金</option><option value="6">土</option><option value="0">日</option>
        </select>
      </div>
      <div id="nthWrap" style="display:none;">
        <label for="recurringNth">第n週</label>
        <select id="recurringNth">
          <option value="1">第1</option><option value="2">第2</option><option value="3">第3</option><option value="4">第4</option><option value="5">第5</option>
        </select>
      </div>
      <div id="monthDayWrap" style="display:none;">
        <label for="recurringMonthDay">日付</label>
        <input id="recurringMonthDay" type="number" min="1" max="31" value="25">
      </div>
    </div>
    <div class="modal-actions">
      <button id="saveSchedule" class="primary" type="button">設定を保存</button>
      <button id="cancelSchedule" class="secondary" type="button">キャンセル</button>
    </div>
  </div>
</div>

<script>
(() => {
  const appData = {
    patterns: {},
    state: {
      settings: {},
      orders: []
    },
    backups: {}
  };
  const stepsTbody = document.querySelector('#stepsTable tbody');
  const ordersTbody = document.querySelector('#ordersTable tbody');
  const resultEl = document.getElementById('result');
  const statusEl = document.getElementById('status');
  const scheduleModal = document.getElementById('scheduleModal');
  let editingScheduleRow = null;
  const SESSION_CACHE_KEY = 'scheduler-session-cache-v1';

  const SAMPLE_STEPS = [
    { name: '出荷', days: 1, color: '#f59e0b' },
    { name: '検査', days: 1, color: '#8b5cf6' },
    { name: '組立', days: 2, color: '#22c55e' },
    { name: '部材準備', days: 2, color: '#38bdf8' }
  ];

  function showStatus(text, isErr) {
    statusEl.style.color = isErr ? '#b91c1c' : '#0f766e';
    statusEl.textContent = text;
  }

  function applyPrintSettings() {
    const cellWidthValue = Number(document.getElementById('printCellWidth').value) || 36;
    const cellWidth = Math.max(24, Math.min(72, cellWidthValue));
    document.documentElement.style.setProperty('--print-cell-width', cellWidth + 'px');

    const cellHeightValue = Number(document.getElementById('printCellHeight').value) || 28;
    const cellHeight = Math.max(20, Math.min(64, cellHeightValue));
    document.documentElement.style.setProperty('--print-cell-height', cellHeight + 'px');

    const colorMode = document.getElementById('printColorMode').value === 'mono' ? 'mono' : 'color';
    document.documentElement.setAttribute('data-print-color', colorMode);
  }

  function toISO(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
  }

  function parseHolidaySet() {
    const raw = document.getElementById('holidayList').value;
    const set = new Set();
    raw.split(/\n+/).map(v => v.trim()).filter(Boolean).forEach(v => set.add(v));
    return set;
  }
  function addHolidayFromPicker() {
    const input = document.getElementById('holidayPicker');
    if (!input) return;
    const value = input.value;
    if (!value) return;
    const area = document.getElementById('holidayList');
    const lines = area.value.split(/\n+/).map(v => v.trim()).filter(Boolean);
    if (!lines.includes(value)) {
      lines.push(value);
      area.value = lines.join('\n');
      saveAppState();
      showStatus('休日を追加しました');
    } else {
      showStatus('既に追加済みです', true);
    }
    input.value = '';
  }

  function isWorkingDay(date, skipWeekend, holidaySet) {
    if (skipWeekend && (date.getDay() === 0 || date.getDay() === 6)) return false;
    return !holidaySet.has(toISO(date));
  }

  function previousWorkingDay(date, skipWeekend, holidaySet) {
    const out = new Date(date);
    out.setDate(out.getDate() - 1);
    while (!isWorkingDay(out, skipWeekend, holidaySet)) out.setDate(out.getDate() - 1);
    return out;
  }

  function nextWorkingDay(date, skipWeekend, holidaySet) {
    const out = new Date(date);
    out.setDate(out.getDate() + 1);
    while (!isWorkingDay(out, skipWeekend, holidaySet)) out.setDate(out.getDate() + 1);
    return out;
  }

  function dateLabel(date) {
    return (date.getMonth() + 1) + '/' + date.getDate();
  }

  function weekdayLabel(date) {
    return ['日', '月', '火', '水', '木', '金', '土'][date.getDay()];
  }

  function refreshIndices(tbody, selector) {
    [].slice.call(tbody.querySelectorAll('tr')).forEach((tr, i) => {
      tr.querySelector(selector).textContent = String(i + 1);
    });
  }

  function moveRow(tr, direction, tbody, indexSelector, afterMove) {
    const other = direction < 0 ? tr.previousElementSibling : tr.nextElementSibling;
    if (!other) return;
    if (direction < 0) tbody.insertBefore(tr, other);
    else tbody.insertBefore(other, tr);
    refreshIndices(tbody, indexSelector);
    if (typeof afterMove === 'function') afterMove();
  }


  function paintColorControl(inputEl, previewEl) {
    const color = inputEl.value;
    inputEl.style.background = color;
    inputEl.style.borderColor = color;
    previewEl.style.background = color;
  }

  function addStepRow(step) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td class="step-index"></td>' +
      '<td class=\'reorder-col\'><div class=\'reorder-group\'><button type=\'button\' class=\'secondary move-up\' title=\'Up\'>&uarr;</button><button type=\'button\' class=\'secondary move-down\' title=\'Down\'>&darr;</button></div></td>' +
      '<td><input class="step-name" placeholder="工程名"></td>' +
      '<td><input type="number" class="step-days" min="1" step="1" value="1"></td>' +
      '<td><div class="color-cell"><span class="color-preview"></span><input type="color" class="step-color" value="#60a5fa"></div></td>' +
      '<td><button type="button" class="danger del-step">×</button></td>';
    tr.querySelector('.step-name').value = step && step.name ? step.name : '';
    tr.querySelector('.step-days').value = step && step.days ? step.days : 1;
    const colorInput = tr.querySelector('.step-color');
    const colorPreview = tr.querySelector('.color-preview');
    colorInput.value = step && step.color ? step.color : '#60a5fa';
    tr.querySelector('.del-step').addEventListener('click', () => {
      tr.remove();
      refreshIndices(stepsTbody, '.step-index');
      renderLegend();
      saveAppState();
    });
    tr.querySelector('.move-up').addEventListener('click', () => {
      moveRow(tr, -1, stepsTbody, '.step-index', () => { renderLegend(); saveAppState(); });
    });
    tr.querySelector('.move-down').addEventListener('click', () => {
      moveRow(tr, 1, stepsTbody, '.step-index', () => { renderLegend(); saveAppState(); });
    });
    paintColorControl(colorInput, colorPreview);
    colorInput.addEventListener('input', () => {
      paintColorControl(colorInput, colorPreview);
      renderLegend();
      saveAppState();
    });
    colorInput.addEventListener('change', () => {
      paintColorControl(colorInput, colorPreview);
      renderLegend();
      saveAppState();
    });
    tr.querySelector('.step-name').addEventListener('input', renderLegend);
    stepsTbody.appendChild(tr);
    refreshIndices(stepsTbody, '.step-index');
  }

  function collectSteps() {
    const rows = [].slice.call(stepsTbody.querySelectorAll('tr')).map(tr => ({
      name: tr.querySelector('.step-name').value.trim(),
      days: Number(tr.querySelector('.step-days').value),
      color: tr.querySelector('.step-color').value
    }));
    if (!rows.length) throw new Error('工程を1つ以上入力してください。');
    rows.forEach((s, i) => {
      if (!s.name) throw new Error((i + 1) + '行目の工程名が空です。');
      if (!Number.isFinite(s.days) || s.days <= 0) throw new Error((i + 1) + '行目の日数が不正です。');
    });
    return rows;
  }

  function renderLegend() {
    const legend = document.getElementById('legend');
    const steps = collectStepsSafe();
    legend.innerHTML = '';
    steps.forEach(s => {
      const span = document.createElement('span');
      span.className = 'chip';
      span.style.background = s.color;
      span.textContent = s.name + ' (' + s.days + '日)';
      legend.appendChild(span);
    });
  }

  function collectStepsSafe() {
    try { return collectSteps(); } catch (e) { return []; }
  }

  function loadPatterns() {
    return appData.patterns;
  }

  function savePatterns(map) {
    appData.patterns = map && typeof map === 'object' ? map : {};
    persistSessionCache();
  }

  function refreshPatternSelect(selected) {
    const sel = document.getElementById('loadPattern');
    sel.innerHTML = '<option value="">--選択--</option>';
    const map = loadPatterns();
    Object.keys(map).sort().forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      if (selected && selected === name) opt.selected = true;
      sel.appendChild(opt);
    });
    refreshOrderPatternOptions();
  }

  function normalizeOrderSchedule(raw) {
    const safe = raw && typeof raw === 'object' ? raw : {};
    const mode = safe.mode === 'recurring' ? 'recurring' : 'fixed';
    const rule = safe.rule && typeof safe.rule === 'object' ? safe.rule : null;
    return { mode, rule };
  }

  function describeOrderSchedule(schedule) {
    const s = normalizeOrderSchedule(schedule);
    if (s.mode !== 'recurring' || !s.rule) return '固定日';
    const wd = ['日', '月', '火', '水', '木', '金', '土'];
    if (s.rule.type === 'weekly') return '毎週' + wd[Number(s.rule.weekday) || 0];
    if (s.rule.type === 'nth_weekday') return '第' + (Number(s.rule.nth) || 1) + wd[Number(s.rule.weekday) || 0];
    if (s.rule.type === 'monthly_day') return '毎月' + (Number(s.rule.day) || 1) + '日';
    return '繰返';
  }

  function setRowSchedule(tr, schedule) {
    const normalized = normalizeOrderSchedule(schedule);
    tr.dataset.schedule = JSON.stringify(normalized);
    tr.querySelector('.order-schedule-btn').textContent = describeOrderSchedule(normalized);
  }

  function getRowSchedule(tr) {
    try {
      return normalizeOrderSchedule(JSON.parse(tr.dataset.schedule || '{"mode":"fixed","rule":null}'));
    } catch (e) {
      return { mode: 'fixed', rule: null };
    }
  }

  function toggleRecurringFields() {
    const mode = document.getElementById('scheduleMode').value;
    const type = document.getElementById('recurringType').value;
    document.getElementById('recurringTypeWrap').style.display = mode === 'recurring' ? 'block' : 'none';
    document.getElementById('weekdayWrap').style.display = mode === 'recurring' ? 'block' : 'none';
    document.getElementById('nthWrap').style.display = (mode === 'recurring' && type === 'nth_weekday') ? 'block' : 'none';
    document.getElementById('monthDayWrap').style.display = (mode === 'recurring' && type === 'monthly_day') ? 'block' : 'none';
  }

  function openScheduleModal(tr) {
    editingScheduleRow = tr;
    const schedule = getRowSchedule(tr);
    document.getElementById('scheduleMode').value = schedule.mode;
    if (schedule.rule && schedule.rule.type) document.getElementById('recurringType').value = schedule.rule.type;
    if (schedule.rule && schedule.rule.weekday != null) document.getElementById('recurringWeekday').value = String(schedule.rule.weekday);
    if (schedule.rule && schedule.rule.nth != null) document.getElementById('recurringNth').value = String(schedule.rule.nth);
    if (schedule.rule && schedule.rule.day != null) document.getElementById('recurringMonthDay').value = String(schedule.rule.day);
    toggleRecurringFields();
    scheduleModal.classList.add('open');
    scheduleModal.setAttribute('aria-hidden', 'false');
  }

  function closeScheduleModal() {
    scheduleModal.classList.remove('open');
    scheduleModal.setAttribute('aria-hidden', 'true');
    editingScheduleRow = null;
  }

  function buildScheduleFromModal() {
    const mode = document.getElementById('scheduleMode').value;
    if (mode !== 'recurring') return { mode: 'fixed', rule: null };
    const type = document.getElementById('recurringType').value;
    if (type === 'weekly') {
      return { mode: 'recurring', rule: { type: 'weekly', weekday: Number(document.getElementById('recurringWeekday').value) } };
    }
    if (type === 'nth_weekday') {
      return { mode: 'recurring', rule: { type: 'nth_weekday', nth: Number(document.getElementById('recurringNth').value), weekday: Number(document.getElementById('recurringWeekday').value) } };
    }
    return { mode: 'recurring', rule: { type: 'monthly_day', day: Number(document.getElementById('recurringMonthDay').value) } };
  }

  function addOrderRow(order) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td class="order-index"></td>' +
      '<td class=\'reorder-col\'><div class=\'reorder-group\'><button type=\'button\' class=\'secondary move-up\' title=\'Up\'>&uarr;</button><button type=\'button\' class=\'secondary move-down\' title=\'Down\'>&darr;</button></div></td>' +
      '<td><input class="order-product" placeholder="品名"></td>' +
      '<td><input type="date" class="order-due"></td>' +
      '<td><button type="button" class="secondary order-schedule-btn">固定日</button></td>' +
      '<td><select class="order-pattern"></select></td>' +
      '<td><button type="button" class="danger del-order">×</button></td>';
    tr.querySelector('.order-product').value = order && order.product ? order.product : '';
    tr.querySelector('.order-due').value = order && order.dueDate ? order.dueDate : '';
    tr.querySelector('.del-order').addEventListener('click', () => {
      tr.remove();
      refreshIndices(ordersTbody, '.order-index');
      saveAppState();
    });
    tr.querySelector('.move-up').addEventListener('click', () => {
      moveRow(tr, -1, ordersTbody, '.order-index', saveAppState);
    });
    tr.querySelector('.move-down').addEventListener('click', () => {
      moveRow(tr, 1, ordersTbody, '.order-index', saveAppState);
    });
    tr.querySelector('.order-product').addEventListener('input', saveAppState);
    tr.querySelector('.order-due').addEventListener('change', saveAppState);
    tr.querySelector('.order-pattern').addEventListener('change', saveAppState);
    tr.querySelector('.order-schedule-btn').addEventListener('click', () => openScheduleModal(tr));
    ordersTbody.appendChild(tr);
    setRowSchedule(tr, order && order.schedule ? order.schedule : { mode: 'fixed', rule: null });
    refreshOrderPatternOptions();
    if (order && order.patternName) tr.querySelector('.order-pattern').value = order.patternName;
    refreshIndices(ordersTbody, '.order-index');
  }

  function refreshOrderPatternOptions() {
    const map = loadPatterns();
    const names = Object.keys(map).sort();
    [].slice.call(ordersTbody.querySelectorAll('.order-pattern')).forEach(sel => {
      const keep = sel.value;
      sel.innerHTML = '';
      names.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });
      if (keep && names.indexOf(keep) >= 0) sel.value = keep;
      else if (names.length) sel.value = names[0];
    });
  }

  function collectOrders() {
    const rows = [].slice.call(ordersTbody.querySelectorAll('tr')).map(tr => ({
      product: tr.querySelector('.order-product').value.trim(),
      dueDate: tr.querySelector('.order-due').value,
      patternName: tr.querySelector('.order-pattern').value,
      schedule: getRowSchedule(tr)
    }));
    if (!rows.length) throw new Error('注文を1件以上入力してください。');
    rows.forEach((r, i) => {
      if (!r.product) throw new Error((i + 1) + '行目の品名が空です。');
      if (r.schedule.mode !== 'recurring' && !r.dueDate) throw new Error((i + 1) + '行目の出荷日が未入力です。');
      if (r.schedule.mode === 'recurring' && !r.schedule.rule) throw new Error((i + 1) + '行目の繰り返し設定が未入力です。');
      if (!r.patternName) throw new Error((i + 1) + '行目の作業パターンが未選択です。');
    });
    return rows;
  }

  function collectOrdersForState() {
    return [].slice.call(ordersTbody.querySelectorAll('tr')).map(tr => ({
      product: tr.querySelector('.order-product').value.trim(),
      dueDate: tr.querySelector('.order-due').value,
      patternName: tr.querySelector('.order-pattern').value,
      schedule: getRowSchedule(tr)
    }));
  }

  function nthWeekdayOfMonth(year, month, nth, weekday) {
    const first = new Date(year, month, 1);
    const shift = (weekday - first.getDay() + 7) % 7;
    const day = 1 + shift + (nth - 1) * 7;
    const out = new Date(year, month, day);
    if (out.getMonth() !== month) return null;
    return out;
  }

  function nextRecurringDate(schedule, fromDate) {
    const s = normalizeOrderSchedule(schedule);
    const from = new Date(fromDate);
    from.setHours(0, 0, 0, 0);
    if (s.mode !== 'recurring' || !s.rule) return null;
    if (s.rule.type === 'weekly') {
      const target = Number(s.rule.weekday);
      const out = new Date(from);
      const add = (target - out.getDay() + 7) % 7;
      out.setDate(out.getDate() + add);
      return out;
    }
    if (s.rule.type === 'nth_weekday') {
      const nth = Math.max(1, Math.min(5, Number(s.rule.nth) || 1));
      const weekday = Number(s.rule.weekday) || 0;
      for (let i = 0; i < 24; i++) {
        const base = new Date(from.getFullYear(), from.getMonth() + i, 1);
        const hit = nthWeekdayOfMonth(base.getFullYear(), base.getMonth(), nth, weekday);
        if (hit && hit >= from) return hit;
      }
      return null;
    }
    if (s.rule.type === 'monthly_day') {
      const day = Math.max(1, Math.min(31, Number(s.rule.day) || 1));
      for (let i = 0; i < 24; i++) {
        const base = new Date(from.getFullYear(), from.getMonth() + i, 1);
        const monthEnd = new Date(base.getFullYear(), base.getMonth() + 1, 0).getDate();
        const out = new Date(base.getFullYear(), base.getMonth(), Math.min(day, monthEnd));
        if (out >= from) return out;
      }
      return null;
    }
    return null;
  }

  function adjustDueDateToWorkingDay(date, skipWeekend, holidaySet) {
    let out = new Date(date);
    while (!isWorkingDay(out, skipWeekend, holidaySet)) out = previousWorkingDay(out, skipWeekend, holidaySet);
    return out;
  }

  function recurringDatesInRange(schedule, rangeStart, rangeEnd) {
    const out = [];
    let cursor = nextRecurringDate(schedule, rangeStart);
    let guard = 0;
    while (cursor && cursor <= rangeEnd && guard < 240) {
      out.push(new Date(cursor));
      const nextBase = new Date(cursor);
      nextBase.setDate(nextBase.getDate() + 1);
      cursor = nextRecurringDate(schedule, nextBase);
      guard += 1;
    }
    return out;
  }

  function resolveOrdersForGenerate(orders, rangeStart, rangeEnd, skipWeekend, holidaySet) {
    const resolved = [];
    orders.forEach(order => {
      if (order.schedule && order.schedule.mode === 'recurring') {
        const dates = recurringDatesInRange(order.schedule, rangeStart, rangeEnd);
        const adjusted = dates.map(date => toISO(adjustDueDateToWorkingDay(date, skipWeekend, holidaySet)));
        resolved.push(Object.assign({}, order, {
          resolvedDueDates: adjusted,
          dueDate: adjusted[0] || ''
        }));
      } else {
        const baseDate = new Date(order.dueDate);
        const adjusted = toISO(adjustDueDateToWorkingDay(baseDate, skipWeekend, holidaySet));
        resolved.push(Object.assign({}, order, {
          resolvedDueDates: adjusted ? [adjusted] : [],
          dueDate: adjusted
        }));
      }
    });
    return resolved;
  }

  function formatDueCellText(order) {
    const dueDates = Array.isArray(order.resolvedDueDates) ? order.resolvedDueDates : [];
    if (order.schedule && order.schedule.mode === 'recurring') {
      if (!dueDates.length) return '繰返(対象なし)';
      return dueDates[0] + '〜 (' + dueDates.length + '回)';
    }
    return order.dueDate || '';
  }

  function getSettingsState() {
    return {
      startDate: document.getElementById('startDate').value,
      horizonDays: document.getElementById('horizonDays').value,
      skipWeekend: document.getElementById('skipWeekend').checked,
      holidayList: document.getElementById('holidayList').value,
      printCellWidth: document.getElementById('printCellWidth').value,
      printCellHeight: document.getElementById('printCellHeight').value,
      printColorMode: document.getElementById('printColorMode').value,
      printWrapDays: document.getElementById('printWrapDays').value
    };
  }

  function saveAppState() {
    const state = {
      settings: getSettingsState(),
      orders: collectOrdersForState()
    };
    appData.state = state;
    persistSessionCache();
  }

  function loadAppState() {
    return appData.state && typeof appData.state === 'object' ? appData.state : {};
  }

  function restoreAppState() {
    const state = loadAppState();
    if (state.settings) {
      if (state.settings.startDate) document.getElementById('startDate').value = state.settings.startDate;
      if (state.settings.horizonDays) document.getElementById('horizonDays').value = state.settings.horizonDays;
      document.getElementById('skipWeekend').checked = state.settings.skipWeekend !== false;
      document.getElementById('holidayList').value = state.settings.holidayList || '';
      if (state.settings.printCellWidth) document.getElementById('printCellWidth').value = state.settings.printCellWidth;
      else if (state.settings.printCellSize) document.getElementById('printCellWidth').value = state.settings.printCellSize;
      if (state.settings.printCellHeight) document.getElementById('printCellHeight').value = state.settings.printCellHeight;
      else if (state.settings.printRowLines) document.getElementById('printCellHeight').value = String(14 + Number(state.settings.printRowLines) * 7);
      if (state.settings.printColorMode) document.getElementById('printColorMode').value = state.settings.printColorMode;
      if (state.settings.printWrapDays) document.getElementById('printWrapDays').value = state.settings.printWrapDays;
    }
    if (Array.isArray(state.orders) && state.orders.length) {
      ordersTbody.innerHTML = '';
      state.orders.forEach(order => addOrderRow(order));
    }
  }

  function loadBackups() {
    return appData.backups && typeof appData.backups === 'object' ? appData.backups : {};
  }

  function saveBackups(backups) {
    appData.backups = backups && typeof backups === 'object' ? backups : {};
    persistSessionCache();
  }

  function persistSessionCache() {
    try {
      const payload = {
        patterns: appData.patterns,
        state: appData.state,
        backups: appData.backups
      };
      sessionStorage.setItem(SESSION_CACHE_KEY, JSON.stringify(payload));
    } catch (e) {}
  }

  function restoreSessionCache() {
    try {
      const raw = sessionStorage.getItem(SESSION_CACHE_KEY);
      if (!raw) return false;
      const parsed = JSON.parse(raw);
      const normalized = normalizeImportedData(parsed);
      appData.patterns = normalized.patterns;
      appData.state = normalized.state;
      appData.backups = normalized.backups;
      return true;
    } catch (e) {
      return false;
    }
  }

  function normalizeImportedData(raw) {
    const safe = raw && typeof raw === 'object' ? raw : {};
    const rawOrders = safe.state && safe.state.orders;
    return {
      patterns: safe.patterns && typeof safe.patterns === 'object' ? safe.patterns : {},
      state: safe.state && typeof safe.state === 'object'
        ? {
            settings: safe.state.settings && typeof safe.state.settings === 'object' ? safe.state.settings : {},
            orders: Array.isArray(rawOrders)
              ? rawOrders.map(order => ({
                  product: order && order.product ? String(order.product) : '',
                  dueDate: order && order.dueDate ? String(order.dueDate) : '',
                  patternName: order && order.patternName ? String(order.patternName) : '',
                  schedule: normalizeOrderSchedule(order && order.schedule ? order.schedule : null)
                }))
              : []
          }
        : { settings: {}, orders: [] },
      backups: safe.backups && typeof safe.backups === 'object' ? safe.backups : {}
    };
  }

  function exportJsonData() {
    saveAppState();
    const payload = {
      patterns: loadPatterns(),
      state: loadAppState(),
      backups: loadBackups()
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'scheduler-data-' + new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-') + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showStatus('JSON保存しました。');
  }

  function importJsonData(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(String(reader.result || '{}'));
        const data = normalizeImportedData(parsed);
        savePatterns(data.patterns);
        saveBackups(data.backups);
        appData.state = data.state;

        refreshPatternSelect('標準');
        const selectedName = loadPatterns()['標準'] ? '標準' : Object.keys(loadPatterns())[0];
        stepsTbody.innerHTML = '';
        if (selectedName && loadPatterns()[selectedName]) {
          loadPatterns()[selectedName].forEach(addStepRow);
          document.getElementById('patternName').value = selectedName;
          document.getElementById('loadPattern').value = selectedName;
        }
        renderLegend();
        restoreAppState();
        applyPrintSettings();
        if (!ordersTbody.querySelector('tr')) addOrderRow({ product: '', dueDate: '', patternName: selectedName || '標準' });
        saveAppState();
        showStatus('JSON読込しました。');
      } catch (e) {
        showStatus('JSON読込に失敗しました: ' + e.message, true);
      }
    };
    reader.onerror = () => showStatus('JSONファイルの読込に失敗しました。', true);
    reader.readAsText(file);
  }

  function buildTimelineDays(startDate, count, skipWeekend, holidaySet) {
    const days = [];
    let cur = new Date(startDate);
    while (days.length < count) {
      if (isWorkingDay(cur, skipWeekend, holidaySet)) days.push(new Date(cur));
      cur = nextWorkingDay(cur, false, new Set());
    }
    return days;
  }

  function calcOrderTasks(order, steps, skipWeekend, holidaySet) {
    const due = new Date(order.dueDate);
    if (Number.isNaN(due.getTime())) throw new Error(order.product + ' の出荷日が不正です。');
    let cursor = new Date(due);
    while (!isWorkingDay(cursor, skipWeekend, holidaySet)) cursor = previousWorkingDay(cursor, skipWeekend, holidaySet);

    const tasks = [];
    for (let i = 0; i < steps.length; i++) {
      const step = steps[i];
      let stepEnd = new Date(cursor);
      let start = new Date(cursor);
      for (let d = 1; d < step.days; d++) start = previousWorkingDay(start, skipWeekend, holidaySet);
      tasks.push({ name: step.name, color: step.color, start: new Date(start), end: new Date(stepEnd), days: step.days });
      cursor = previousWorkingDay(start, skipWeekend, holidaySet);
    }
    return tasks;
  }

  function findTaskForDate(tasks, day) {
    const t = day.getTime();
    for (let i = tasks.length - 1; i >= 0; i--) {
      const task = tasks[i];
      if (task.start.getTime() <= t && t <= task.end.getTime()) return task;
    }
    return null;
  }

  function chunkTimelineDays(days, wrapDays) {
    if (!wrapDays || wrapDays <= 0) return [days];
    const chunks = [];
    for (let i = 0; i < days.length; i += wrapDays) chunks.push(days.slice(i, i + wrapDays));
    return chunks;
  }

  function buildMatrixTable(daySlice, orders, map, activePatternName, activeDraftSteps, skipWeekend, holidaySet) {
    const table = document.createElement('table');
    table.className = 'matrix';

    const thead = document.createElement('thead');
    const rDate = document.createElement('tr');
    rDate.innerHTML = '<th class="left-col">日付</th><th class="due-col">出荷日</th>';
    daySlice.forEach(d => {
      const th = document.createElement('th');
      th.textContent = dateLabel(d);
      rDate.appendChild(th);
    });
    const rWeek = document.createElement('tr');
    rWeek.innerHTML = '<th class="left-col">曜日</th><th class="due-col"></th>';
    daySlice.forEach(d => {
      const th = document.createElement('th');
      th.textContent = weekdayLabel(d);
      rWeek.appendChild(th);
    });
    thead.appendChild(rDate);
    thead.appendChild(rWeek);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    orders.forEach(order => {
      const steps = order.patternName === activePatternName && activeDraftSteps.length
        ? activeDraftSteps
        : map[order.patternName];
      if (!steps) throw new Error('未登録パターンです: ' + order.patternName);
      const dueDates = Array.isArray(order.resolvedDueDates) ? order.resolvedDueDates : [order.dueDate];
      const tasks = [];
      dueDates.filter(Boolean).forEach(dueDate => {
        calcOrderTasks(Object.assign({}, order, { dueDate }), steps, skipWeekend, holidaySet).forEach(t => tasks.push(t));
      });

      const tr = document.createElement('tr');
      const tName = document.createElement('td');
      tName.className = 'left-col';
      tName.textContent = order.product;
      tr.appendChild(tName);
      const tDue = document.createElement('td');
      tDue.className = 'due-col';
      tDue.textContent = formatDueCellText(order);
      tr.appendChild(tDue);

      daySlice.forEach(day => {
        const td = document.createElement('td');
        const task = findTaskForDate(tasks, day);
        if (task) {
          td.style.background = task.color;
          td.title = task.name + ' (' + task.days + '日)';
          td.textContent = task.name;
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    return table;
  }

  function generate() {
    const map = loadPatterns();
    const activePatternName = document.getElementById('loadPattern').value;
    const activeDraftSteps = collectStepsSafe();
    const startText = document.getElementById('startDate').value;
    const horizon = Number(document.getElementById('horizonDays').value);
    const skipWeekend = document.getElementById('skipWeekend').checked;
    const holidaySet = parseHolidaySet();

    if (!startText) throw new Error('表示開始日を入力してください。');
    if (!Number.isFinite(horizon) || horizon < 5) throw new Error('営業日数は5以上を入力してください。');

    const timelineDays = buildTimelineDays(new Date(startText), horizon, skipWeekend, holidaySet);
    const timelineStart = timelineDays[0];
    const timelineEnd = timelineDays[timelineDays.length - 1];
    const orders = resolveOrdersForGenerate(collectOrders(), timelineStart, timelineEnd, skipWeekend, holidaySet);
    const wrapMode = document.getElementById('printWrapDays').value;
    const wrapDays = wrapMode === '15' ? 15 : 0;
    const dayChunks = chunkTimelineDays(timelineDays, wrapDays);

    const stack = document.createElement('div');
    stack.className = 'matrix-stack';
    dayChunks.forEach(slice => {
      stack.appendChild(buildMatrixTable(slice, orders, map, activePatternName, activeDraftSteps, skipWeekend, holidaySet));
    });

    resultEl.innerHTML = '';
    resultEl.appendChild(stack);
    showStatus('生成完了: ' + orders.length + '件 / ' + horizon + '営業日を表示');
  }

  document.getElementById('addStep').addEventListener('click', () => addStepRow());
  document.getElementById('applySample').addEventListener('click', () => {
    stepsTbody.innerHTML = '';
    SAMPLE_STEPS.forEach(addStepRow);
    renderLegend();
    saveAppState();
  });

  document.getElementById('savePattern').addEventListener('click', () => {
    try {
      const name = document.getElementById('patternName').value.trim();
      if (!name) throw new Error('パターン名を入力してください。');
      const map = loadPatterns();
      map[name] = collectSteps();
      savePatterns(map);
      refreshPatternSelect(name);
      showStatus('パターン「' + name + '」を保存しました。');
      saveAppState();
    } catch (e) {
      showStatus(e.message, true);
    }
  });

  document.getElementById('loadPattern').addEventListener('change', e => {
    const name = e.target.value;
    const map = loadPatterns();
    if (!name || !map[name]) return;
    stepsTbody.innerHTML = '';
    map[name].forEach(addStepRow);
    document.getElementById('patternName').value = name;
    renderLegend();
    saveAppState();
  });

  document.getElementById('deletePattern').addEventListener('click', () => {
    const name = document.getElementById('loadPattern').value;
    if (!name) return showStatus('削除するパターンを選択してください。', true);
    const map = loadPatterns();
    delete map[name];
    savePatterns(map);
    refreshPatternSelect('');
    showStatus('パターン「' + name + '」を削除しました。');
    saveAppState();
  });

  document.getElementById('addOrder').addEventListener('click', () => { addOrderRow(); saveAppState(); });
  document.getElementById('clearOrders').addEventListener('click', () => {
    if (!window.confirm('登録済みの注文をすべて削除します。本当にいいですか？')) return;
    ordersTbody.innerHTML = '';
    addOrderRow({ product: '', dueDate: '', patternName: '標準' });
    showStatus('注文をクリアしました。');
    saveAppState();
  });
  document.getElementById('generate').addEventListener('click', () => {
    try { generate(); } catch (e) { showStatus(e.message, true); }
  });
  document.getElementById('importJson').addEventListener('click', () => {
    document.getElementById('jsonFileInput').click();
  });
  document.getElementById('exportJson').addEventListener('click', () => {
    try { exportJsonData(); } catch (e) { showStatus(e.message, true); }
  });
  document.getElementById('jsonFileInput').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    importJsonData(file);
    e.target.value = '';
  });
  document.getElementById('scheduleMode').addEventListener('change', toggleRecurringFields);
  document.getElementById('recurringType').addEventListener('change', toggleRecurringFields);
  document.getElementById('saveSchedule').addEventListener('click', () => {
    if (!editingScheduleRow) return;
    const schedule = buildScheduleFromModal();
    setRowSchedule(editingScheduleRow, schedule);
    saveAppState();
    closeScheduleModal();
    showStatus('繰り返し設定を保存しました。');
  });
  document.getElementById('cancelSchedule').addEventListener('click', closeScheduleModal);
  scheduleModal.addEventListener('click', e => {
    if (e.target === scheduleModal) closeScheduleModal();
  });
  ['startDate', 'horizonDays', 'holidayList'].forEach(id => {
    document.getElementById(id).addEventListener('input', saveAppState);
  });
  document.getElementById('addHoliday').addEventListener('click', addHolidayFromPicker);
  document.getElementById('holidayPicker').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addHolidayFromPicker(); }
  });
  document.getElementById('skipWeekend').addEventListener('change', saveAppState);
  document.getElementById('printCellWidth').addEventListener('input', () => { applyPrintSettings(); saveAppState(); });
  document.getElementById('printCellHeight').addEventListener('input', () => { applyPrintSettings(); saveAppState(); });
  document.getElementById('printColorMode').addEventListener('change', () => { applyPrintSettings(); saveAppState(); });
  document.getElementById('printWrapDays').addEventListener('change', saveAppState);
  document.getElementById('printPdf').addEventListener('click', () => {
    applyPrintSettings();
    window.print();
  });

  const today = new Date();
  document.getElementById('startDate').value = toISO(today);

  const restoredFromSession = restoreSessionCache();

  const defaultMap = loadPatterns();
  if (!defaultMap['標準']) {
    defaultMap['標準'] = SAMPLE_STEPS;
    savePatterns(defaultMap);
  }
  refreshPatternSelect('標準');
  stepsTbody.innerHTML = '';
  loadPatterns()['標準'].forEach(addStepRow);
  renderLegend();
  restoreAppState();
  applyPrintSettings();
  if (!ordersTbody.querySelector('tr')) addOrderRow({ product: '', dueDate: '', patternName: '標準' });
  saveAppState();
  if (restoredFromSession) showStatus('ページ再読込のため一時キャッシュを復元しました。確定保存はJSON保存を使ってください。');

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
  }
})();
</script>
